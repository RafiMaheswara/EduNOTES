<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNOTES - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --edunotes-blue: #0d6efd;
            --pop-purple: #bb86fc;
            --input-bg: #2a2a2a;
            --input-border: #3a3a3a;
        }

        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-dark); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; }

        .fade-in { animation: fadeIn 0.5s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* NAVBAR */
        .navbar { background-color: rgba(18, 18, 18, 0.95) !important; backdrop-filter: blur(10px); border-bottom: 1px solid #333 !important; z-index: 1050; }
        .navbar-brand { color: var(--edunotes-blue) !important; }

        /* AUTH */
        .bg-decor { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
        .bg-decor span { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12; }
        .decor-1 { width: 500px; height: 500px; background: var(--edunotes-blue); top: -150px; left: -150px; }
        .decor-2 { width: 400px; height: 400px; background: var(--pop-purple); bottom: -100px; right: -100px; }
        .page-wrapper { position: relative; z-index: 1; min-height: calc(100vh - 70px); display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .auth-card { width: 100%; max-width: 440px; background: var(--card-dark); border: 1px solid #2e2e2e; border-radius: 1.5rem; padding: 2.5rem 2rem; }

        .hero-title { background: linear-gradient(90deg, #fff, var(--edunotes-blue)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .form-control-dark { background-color: var(--input-bg) !important; border: 1px solid var(--input-border) !important; border-radius: 0.6rem !important; color: #fff !important; padding: 0.75rem 1rem !important; }
        .form-control-dark::placeholder { color: #ffffff !important; opacity: 0.8; }
        .btn-primary-custom { background: var(--edunotes-blue); border: none; border-radius: 0.6rem; padding: 0.75rem; font-weight: 600; color: #fff; width: 100%; transition: 0.2s; }
        .btn-primary-custom:hover { background: #0b5ed7; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(13, 110, 253, 0.3); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark py-3 sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold fs-4" href="index.html">EduNOTES</a>
  </div>
</nav>

<div class="bg-decor"><span class="decor-1"></span><span class="decor-2"></span></div>
<div class="page-wrapper fade-in">
    <div class="auth-card">
        <div class="text-center mb-4">
            <h2 class="hero-title fw-800">EduNOTES</h2>
            <p class="text-secondary mt-2">Selamat datang kembali 👋</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="small fw-bold text-secondary mb-1">Email</label>
                <div class="input-group">
                    <input type="email" class="form-control form-control-dark" placeholder="Masukkan email" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="small fw-bold text-secondary mb-1">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control form-control-dark" placeholder="Masukkan password" required>
                </div>
            </div>
            <button type="submit" class="btn-primary-custom mb-3">Masuk</button>
            <p class="text-center small text-secondary">Belum punya akun? <a href="register.html" class="text-primary text-decoration-none fw-bold">Daftar sekarang</a></p>
            <div class="text-center">
                <a href="index.html" class="btn btn-link btn-sm text-secondary text-decoration-none"><i class="fa-solid fa-arrow-left"></i> Home</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        alert("Login Berhasil!");
        // TODO: redirect ke dashboard
        window.location.href = 'V2.html';
    };
</script>

</body>
</html>
